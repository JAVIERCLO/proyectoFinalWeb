services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
      build: ./backend
      container_name: backend_app
      ports:
        - "${BACKEND_PORT}:3000"
      env_file:
        - ./backend/.env
      depends_on:
        - postgres

volumes:
  postgres_data:


